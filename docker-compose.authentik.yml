# Authentik - Authentication & Identity Provider
# Run with: docker compose -f docker-compose.yml -f docker-compose.authentik.yml up

services:
  authentik-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authentik"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - authentik_postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${AUTHENTIK_PG_PASSWORD:-authentik}
      POSTGRES_USER: authentik
      POSTGRES_DB: authentik

  authentik-redis:
    image: redis:alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 5

  authentik-server:
    image: ghcr.io/goauthentik/server:2025.12
    restart: unless-stopped
    command: server
    environment:
      AUTHENTIK_REDIS__HOST: authentik-redis
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgres
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_PG_PASSWORD:-authentik}
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:-secret_key}
      AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
      # For local development without HTTPS
      AUTHENTIK_LISTEN__HTTP: 0.0.0.0:9000
    volumes:
      - authentik_media:/media
      - authentik_templates:/templates
      # Custom blueprints for Dansbart
      - ./authentik/blueprints:/blueprints/custom
    ports:
      - "9000:9000"  # Web UI & OIDC endpoints
    depends_on:
      - authentik-postgres
      - authentik-redis

  authentik-worker:
    image: ghcr.io/goauthentik/server:2025.12
    restart: unless-stopped
    command: worker
    environment:
      AUTHENTIK_REDIS__HOST: authentik-redis
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgres
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_PG_PASSWORD:-authentik}
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:-secret_key}
    volumes:
      - authentik_media:/media
      - authentik_templates:/templates
      # Custom blueprints for Dansbart (worker also needs access)
      - ./authentik/blueprints:/blueprints/custom
    depends_on:
      - authentik-postgres
      - authentik-redis

volumes:
  authentik_postgres:
  authentik_media:
  authentik_templates:
