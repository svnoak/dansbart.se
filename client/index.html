<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dansbart - Hitta Rätt Låt</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .card { transition: transform 0.2s; }
        .card:hover { transform: translateY(-2px); }
    </style>
</head>
<body>
    <div id="app" class="min-h-screen p-8">
        <!-- Header -->
        <header class="max-w-4xl mx-auto mb-10 text-center">
            <h1 class="text-4xl font-bold text-gray-800 mb-2">🎻 Dansbart.se</h1>
            <p class="text-gray-600">Automated Swedish Folk Music Analysis</p>
        </header>

        <!-- Filters -->
        <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-sm p-6 mb-8">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                
                <!-- Style Filter -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Dance Style</label>
                    <select v-model="filters.style" @change="fetchTracks" class="w-full p-2 border rounded-lg bg-gray-50 focus:ring-2 focus:ring-blue-500">
                        <option value="">All Styles</option>
                        <option value="Hambo">Hambo</option>
                        <option value="Schottis">Schottis</option>
                        <option value="Polska">Polska</option>
                        <option value="Engelska">Engelska</option>
                        <option value="Snoa/Polka">Snoa / Polka</option>
                        <option value="Vals">Vals</option>
                    </select>
                </div>

                <!-- BPM Slider -->
                <div class="md:col-span-2">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        Tempo (BPM): <span class="text-blue-600">{{ filters.minBpm }} - {{ filters.maxBpm }}</span>
                    </label>
                    <div class="flex items-center gap-4">
                        <input type="range" v-model="filters.minBpm" min="50" max="200" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer">
                        <input type="range" v-model="filters.maxBpm" min="50" max="200" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer">
                    </div>
                    <div class="flex justify-between text-xs text-gray-400 mt-1">
                        <span>Slow</span>
                        <span>Fast</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Results Grid -->
        <div class="max-w-4xl mx-auto">
            <div v-if="loading" class="text-center py-12">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto"></div>
                <p class="mt-4 text-gray-500">Loading tracks...</p>
            </div>

            <div v-else-if="tracks.length === 0" class="text-center py-12 bg-white rounded-xl">
                <p class="text-gray-500">No tracks found matching your criteria.</p>
            </div>

            <div v-else class="grid gap-4">
                <div v-for="track in tracks" :key="track.id" class="card bg-white p-4 rounded-lg shadow-sm border border-gray-100 flex items-center justify-between">
                    
                    <!-- Track Info -->
                    <div class="flex-1">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="px-2 py-1 bg-blue-100 text-blue-800 text-xs font-bold rounded-full uppercase">
                                {{ track.dance_style }}
                            </span>
                            <span class="text-gray-400 text-xs flex items-center">
                                ⏱️ {{ track.effective_bpm }} BPM
                            </span>
                        </div>
                        <h3 class="font-bold text-lg text-gray-900">{{ track.title }}</h3>
                        <p class="text-gray-600 text-sm">{{ track.artist_name }} • <span class="italic">{{ track.album_name }}</span></p>
                    </div>

                    <!-- Action -->
                    <div>
                        <a :href="track.playback_links[0]?.deep_link" target="_blank" 
                           class="flex items-center gap-2 bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-full font-semibold transition-colors shadow-md">
                            <span>Play</span>
                            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, onMounted, watch } = Vue;

        createApp({
            setup() {
                const tracks = ref([]);
                const loading = ref(false);
                const filters = ref({
                    style: '',
                    minBpm: 50,
                    maxBpm: 200
                });

                const fetchTracks = async () => {
                    loading.value = true;
                    try {
                        // Build Query Params
                        const params = new URLSearchParams();
                        if (filters.value.style) params.append('style', filters.value.style);
                        params.append('min_bpm', filters.value.minBpm);
                        params.append('max_bpm', filters.value.maxBpm);

                        const response = await fetch(`http://127.0.0.1:8000/api/tracks?${params.toString()}`);
                        const data = await response.json();
                        tracks.value = data;
                    } catch (error) {
                        console.error("Error fetching tracks:", error);
                    } finally {
                        loading.value = false;
                    }
                };

                // Debounce slider changes so we don't spam the API
                let timeout;
                watch(() => [filters.value.minBpm, filters.value.maxBpm], () => {
                    clearTimeout(timeout);
                    timeout = setTimeout(fetchTracks, 500);
                });

                onMounted(() => {
                    fetchTracks();
                });

                return { tracks, loading, filters, fetchTracks };
            }
        }).mount('#app');
    </script>
</body>
</html>
