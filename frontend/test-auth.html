<!DOCTYPE html>
<html>
<head>
    <title>Auth Debug</title>
</head>
<body>
    <h1>Auth Debugging</h1>
    <div id="output"></div>

    <script type="module">
        import { UserManager } from 'https://cdn.jsdelivr.net/npm/oidc-client-ts@3/dist/browser/index.js';

        const oidcConfig = {
            authority: 'http://localhost:9000/application/o/dansbart/',
            client_id: 'dansbart-client',
            redirect_uri: 'http://localhost:8080/auth/callback',
            response_type: 'code',
            scope: 'openid email profile',
        };

        const userManager = new UserManager(oidcConfig);

        async function checkAuth() {
            const output = document.getElementById('output');

            try {
                // Check stored user
                const user = await userManager.getUser();

                output.innerHTML = `
                    <h2>Auth Status</h2>
                    <pre>${JSON.stringify(user, null, 2)}</pre>

                    <h2>LocalStorage Keys</h2>
                    <pre>${JSON.stringify(Object.keys(localStorage), null, 2)}</pre>

                    <h2>LocalStorage Content</h2>
                `;

                for (let key of Object.keys(localStorage)) {
                    const div = document.createElement('div');
                    div.innerHTML = `<strong>${key}:</strong><br><pre>${localStorage.getItem(key)}</pre><hr>`;
                    output.appendChild(div);
                }

            } catch (error) {
                output.innerHTML = `<h2 style="color: red;">Error: ${error.message}</h2>
                    <pre>${error.stack}</pre>`;
            }
        }

        checkAuth();
    </script>
</body>
</html>
