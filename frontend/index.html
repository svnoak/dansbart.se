<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dansbart - Hitta Rätt Låt</title>
        <!-- Preconnect to CDN for faster loading -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <script type="importmap">
    {
        "imports": {
            "vue": "https://cdn.jsdelivr.net/npm/vue@3.4.21/dist/vue.esm-browser.js"
        }
    }
    </script>
    
    <!-- Optional: Add favicon -->
    <link rel="icon" href="/favicon.ico">
</head>
<body class="overflow-x-hidden">
    <div id="app" class="min-h-screen px-4 py-6 sm:p-8 pb-40 font-sans bg-gray-50 overflow-x-hidden">
        
        <header class="max-w-4xl mx-auto mb-10 text-center">
            <h1 class="text-4xl font-bold text-gray-800 mb-2">🎻 Dansbart.se</h1>

            <stats-dashboard></stats-dashboard>
        </header>

        <filter-bar
            v-model:style="filters.style"
            v-model:search="filters.search"
            v-model:source="filters.source"
            v-model:vocals="filters.vocals"
            v-model:style-confirmed="filters.styleConfirmed"
            v-model:min-duration="filters.minDuration"
            v-model:max-duration="filters.maxDuration"
            v-model:target-tempo="targetTempo"
            v-model:tempo-enabled="tempoEnabled"
            :computed-min="computedMin"
            :computed-max="computedMax"
            :styles="availableStyles"
        ></filter-bar>

        <div class="max-w-4xl mx-auto">
            <div v-if="loading" class="text-center py-12">Loading...</div>
            
            <div v-else class="grid gap-4">
                <track-card 
                    v-for="track in tracks" 
                    :key="track.id" 
                    :track="track"
                    :current-track="currentTrack"
                    :is-spotify-mode="activeSource === 'spotify'"
                    :is-playing="isPlaying"
                    @play="handlePlay"
                    @stop="togglePlay"
                    @refresh="fetchTracks"
                ></track-card>

                <!-- Infinite Scroll Trigger -->
                <div data-scroll-trigger class="py-8 text-center">
                    <div v-if="loadingMore" class="flex items-center justify-center gap-2 text-gray-500">
                        <svg class="animate-spin h-5 w-5" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                        </svg>
                        <span>Laddar fler...</span>
                    </div>
                    <div v-else-if="!hasMore && tracks.length > 0" class="text-gray-400 text-sm">
                        Inga fler låtar att visa
                    </div>
                </div>
            </div>
        </div>

        <global-player></global-player>
    </div>

    <script type="module" src="./js/app.js"></script>
</body>
</html>
