<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dansbart - Hitta Rätt Låt</title>
    <script src="https://cdn.tailwindcss.com"></script>
    </head>
<body>
    <div id="app" class="min-h-screen p-8 pb-40 font-sans bg-gray-50">
        
        <header class="max-w-4xl mx-auto mb-10 text-center">
            <h1 class="text-4xl font-bold text-gray-800 mb-2">🎻 Dansbart.se</h1>

            <stats-dashboard></stats-dashboard>
        </header>

        <filter-bar 
            v-model="targetTempo"
            v-model:filters="filters"
            v-model:tempo-enabled="tempoEnabled"  :min="computedMin"
            :max="computedMax"
            :left-pct="getRangeLeftPct"
            :width-pct="getRangeWidthPct"
        ></filter-bar>

        <div class="max-w-4xl mx-auto">
            <div v-if="loading" class="text-center py-12">Loading...</div>
            
            <div v-else class="grid gap-4">
                <track-card 
                    v-for="track in tracks" 
                    :key="track.id" 
                    :track="track"
                    :current-track="currentTrack"
                    :is-spotify-mode="useSpotifyFallback"
                    :is-playing="isPlaying"
                    @play="handlePlay"
                    @stop="togglePlay"
                    @refresh="fetchTracks"
                ></track-card>
            </div>
        </div>

        <global-player
            @report-link="handlePotentialBrokenLink"
        ></global-player>

        <broken-link-toast
        :broken-state="potentialBrokenState"
        @close="potentialBrokenState = null"
    ></broken-link-toast>
    </div>

    <script type="module" src="./js/app.js"></script>
</body>
</html>
