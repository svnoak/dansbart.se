<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Dansbart - Hitta Rätt Låt</title>
    <link rel="icon" href="/favicon.ico" />
  </head>
  <body class="overflow-x-hidden bg-gray-50">
    <div id="app" class="min-h-screen pb-40 font-sans overflow-x-hidden">
      <site-header 
        :current-page="currentPage" 
        @navigate="navigateToPage">
      </site-header>

      <div class="px-5 py-6 sm:p-8">
        <!-- Router View for special pages (auth callback, playlists) -->
        <router-view v-if="currentPage === 'authCallback' || currentPage === 'playlists' || currentPage === 'playlist'"></router-view>

        <!-- Discovery Page View -->
        <div v-else-if="currentPage === 'discovery'">
          <discovery-page
            :current-track="currentTrack"
            :is-playing="isPlaying"
            :is-spotify-mode="activeSource === 'spotify'"
            @play="handleDiscoveryPlay"
            @stop="togglePlay"
            @navigate-to-search="navigateToSearch"
            @navigate-to-classify="navigateToClassify"
            @refresh="fetchTracks"
            @filter-style="handleFilterStyle"
            @show-similar="showSimilarModal"
            @add-to-queue="addToQueue"
          ></discovery-page>
        </div>

        <div v-else-if="currentPage === 'classify'">
            <classify-page
                :current-track="currentTrack"
                :is-playing="isPlaying"
                @play="handleDiscoveryPlay"
                @stop="togglePlay"
            ></classify-page>
        </div>

        <!-- Artist Page View -->
        <div v-else-if="currentPage === 'artist'">
          <artist-page
            :artist-id="currentArtistId"
            :current-track="currentTrack"
            :is-playing="isPlaying"
            :is-spotify-mode="activeSource === 'spotify'"
            @play="handlePlay"
            @navigate-to-album="navigateToAlbum"
            @show-similar="showSimilarModal"
            @add-to-queue="addToQueue"
          ></artist-page>
        </div>

        <!-- Album Page View -->
        <div v-else-if="currentPage === 'album'">
          <album-page
            :album-id="currentAlbumId"
            :current-track="currentTrack"
            :is-playing="isPlaying"
            :is-spotify-mode="activeSource === 'spotify'"
            @play="handlePlay"
            @navigate-to-artist="navigateToArtist"
            @show-similar="showSimilarModal"
            @add-to-queue="addToQueue"
          ></album-page>
        </div>

        <!-- Search Page View -->
        <search-page
          v-else
          :filters="filters"
          :style-tree="styleTree"
          :target-tempo="targetTempo"
          :tempo-enabled="tempoEnabled"
          :computed-min="computedMin"
          :computed-max="computedMax"
          :min-bounciness="minBounciness"
          :max-bounciness="maxBounciness"
          :bounciness-enabled="bouncinessEnabled"
          :min-articulation="minArticulation"
          :max-articulation="maxArticulation"
          :articulation-enabled="articulationEnabled"
          :tracks="tracks"
          :loading="loading"
          :loading-more="loadingMore"
          :has-more="hasMore"
          :artists="artists"
          :albums="albums"
          :current-track="currentTrack"
          :is-playing="isPlaying"
          :active-source="activeSource"
          @update:main-style="filters.mainStyle = $event"
          @update:sub-style="filters.subStyle = $event"
          @update:search="filters.search = $event"
          @update:search-type="filters.searchType = $event"
          @update:source="filters.source = $event"
          @update:vocals="filters.vocals = $event"
          @update:style-confirmed="filters.styleConfirmed = $event"
          @update:traditional-only="filters.traditionalOnly = $event"
          @update:min-duration="filters.minDuration = $event"
          @update:max-duration="filters.maxDuration = $event"
          @update:target-tempo="targetTempo = $event"
          @update:tempo-enabled="tempoEnabled = $event"
          @update:min-bounciness="minBounciness = $event"
          @update:max-bounciness="maxBounciness = $event"
          @update:bounciness-enabled="bouncinessEnabled = $event"
          @update:min-articulation="minArticulation = $event"
          @update:max-articulation="maxArticulation = $event"
          @update:articulation-enabled="articulationEnabled = $event"
          @filter-style="handleFilterStyle"
          @play="handlePlay"
          @stop="togglePlay"
          @refresh="fetchTracks"
          @show-similar="showSimilarModal"
          @add-to-queue="addToQueue"
          @navigate-to-artist="navigateToArtist"
          @navigate-to-album="navigateToAlbum"
        ></search-page>
      </div>

      <global-player
        :current-page="currentPage"
        @navigate-to-artist="navigateToArtist"
        @navigate-to-album="navigateToAlbum"
      ></global-player>
      <cookie-consent></cookie-consent>
      <toast-container></toast-container>
      <similar-tracks-modal
        :track-id="similarModalTrackId"
        :is-open="!!similarModalTrackId"
        :current-track="currentTrack"
        :is-spotify-mode="activeSource === 'spotify'"
        :is-playing="isPlaying"
        @close="closeSimilarModal"
        @play-track="handleSimilarPlay"
        @stop="togglePlay"
        @refresh="fetchTracks"
        @filter-style="handleFilterStyle"
        @update-tracks="tracks => similarTracks = tracks"
      ></similar-tracks-modal>
    </div>

    <script type="module" src="./js/app.ts"></script>
  </body>
</html>
