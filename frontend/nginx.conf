server {
    listen 80;
    server_name localhost;

    absolute_redirect off;

    # 1. Serve Static Files (Your HTML/JS)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 2. Reverse Proxy API calls to the Backend Container
    #
    # Use proxy_pass without an extra /api/ suffix so that a request like:
    #   /api/admin/auth/login
    # is forwarded to the backend as:
    #   http://api:8000/api/admin/auth/login
    location /api/ {
        # 'api' is the service name in docker-compose
        proxy_pass http://api:8000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}