<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dansbart Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        .fade-enter-active, .fade-leave-active { transition: opacity 0.3s; }
        .fade-enter-from, .fade-leave-to { opacity: 0; }
    </style>
</head>
<body class="bg-gray-900 text-white p-2 sm:p-4 md:p-8">
    <div id="admin-panel" class="max-w-6xl mx-auto">
        <h1 class="text-xl sm:text-2xl font-bold mb-4 sm:mb-6">🤖 Dansbart Admin Console</h1>

        <!-- Tab Navigation -->
        <div class="flex flex-wrap gap-1 sm:gap-2 mb-4 sm:mb-6 border-b border-gray-700 pb-2">
            <button @click="activeTab = 'tracks'"
                    :class="activeTab === 'tracks' ? 'bg-indigo-600' : 'bg-gray-700 hover:bg-gray-600'"
                    class="px-2 sm:px-4 py-1.5 sm:py-2 rounded-t text-xs sm:text-sm font-medium">
                <span class="hidden sm:inline">📋 Track Manager</span>
                <span class="sm:hidden">📋</span>
            </button>
            <button @click="activeTab = 'ingest'"
                    :class="activeTab === 'ingest' ? 'bg-indigo-600' : 'bg-gray-700 hover:bg-gray-600'"
                    class="px-2 sm:px-4 py-1.5 sm:py-2 rounded-t text-xs sm:text-sm font-medium">
                <span class="hidden sm:inline">➕ Ingest</span>
                <span class="sm:hidden">➕</span>
            </button>
            <button @click="activeTab = 'bulk'"
                    :class="activeTab === 'bulk' ? 'bg-indigo-600' : 'bg-gray-700 hover:bg-gray-600'"
                    class="px-2 sm:px-4 py-1.5 sm:py-2 rounded-t text-xs sm:text-sm font-medium">
                <span class="hidden sm:inline">⚡ Bulk</span>
                <span class="sm:hidden">⚡</span>
            </button>
            <button @click="activeTab = 'spider'"
                    :class="activeTab === 'spider' ? 'bg-indigo-600' : 'bg-gray-700 hover:bg-gray-600'"
                    class="px-2 sm:px-4 py-1.5 sm:py-2 rounded-t text-xs sm:text-sm font-medium">
                <span class="hidden sm:inline">🕸️ Spider</span>
                <span class="sm:hidden">🕸️</span>
            </button>
            <button @click="activeTab = 'approvals'"
                    :class="activeTab === 'approvals' ? 'bg-indigo-600' : 'bg-gray-700 hover:bg-gray-600'"
                    class="px-2 sm:px-4 py-1.5 sm:py-2 rounded-t text-xs sm:text-sm font-medium">
                <span class="hidden sm:inline">✅ Approvals</span>
                <span class="sm:hidden">✅</span>
            </button>
            <button @click="activeTab = 'pending'"
                    :class="activeTab === 'pending' ? 'bg-indigo-600' : 'bg-gray-700 hover:bg-gray-600'"
                    class="px-2 sm:px-4 py-1.5 sm:py-2 rounded-t text-xs sm:text-sm font-medium">
                <span class="hidden sm:inline">🗑️ Reject</span>
                <span class="sm:hidden">🗑️</span>
            </button>
            <button @click="logout" class="ml-auto text-gray-400 hover:text-white text-xs sm:text-sm px-2 sm:px-3">
                🚪 <span class="hidden sm:inline">Logout</span>
            </button>
        </div>

        <!-- Tab Content -->
        <tracks-tab v-if="activeTab === 'tracks'" />
        <ingest-tab v-if="activeTab === 'ingest'" />
        <bulk-tab v-if="activeTab === 'bulk'" />
        <spider-tab v-if="activeTab === 'spider'" />
        <approvals-tab v-if="activeTab === 'approvals'" />
        <reject-tab v-if="activeTab === 'pending'" />

        <!-- Toast Notifications -->
        <toast-container />
    </div>

    <script type="module" src="./main.js"></script>
</body>
</html>
