<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dansbart Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body class="bg-gray-900 text-white p-8">
    <div id="app" class="max-w-md mx-auto">
        <h1 class="text-2xl font-bold mb-6">🤖 Admin Console</h1>

        <div class="mb-4">
            <label class="block text-xs uppercase text-gray-500 mb-1">Admin Token</label>
            <input v-model="token" type="password" class="w-full bg-gray-800 border border-gray-700 rounded p-2 text-white">
        </div>

        <div class="bg-gray-800 p-6 rounded-lg border border-gray-700">
            <h2 class="font-bold mb-4">Ingest Spotify Playlist</h2>
            
            <div class="mb-4">
                <label class="block text-xs uppercase text-gray-500 mb-1">Playlist ID</label>
                <input v-model="playlistId" placeholder="e.g. 37i9dQZF1DX..." class="w-full bg-gray-900 border border-gray-600 rounded p-2 text-white">
            </div>

            <button 
                @click="runIngest" 
                :disabled="loading"
                class="w-full bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 py-2 rounded font-bold transition-colors"
            >
                <span v-if="loading">Processing...</span>
                <span v-else>Start Pipeline</span>
            </button>

            <p v-if="message" class="mt-4 text-sm" :class="isError ? 'text-red-400' : 'text-green-400'">
                {{ message }}
            </p>
        </div>
    </div>

    <script>
        const { createApp, ref } = Vue;
        createApp({
            setup() {
                const token = ref(localStorage.getItem('admin_token') || '');
                const playlistId = ref('');
                const loading = ref(false);
                const message = ref('');
                const isError = ref(false);

                const runIngest = async () => {
                    loading.value = true;
                    message.value = '';
                    // Save token for next time
                    localStorage.setItem('admin_token', token.value);

                    try {
                        const res = await fetch('/api/admin/ingest', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'x-admin-token': token.value
                            },
                            body: JSON.stringify({ playlist_id: playlistId.value })
                        });

                        const data = await res.json();
                        if (!res.ok) throw new Error(data.detail || 'Failed');
                        
                        isError.value = false;
                        message.value = `Success: ${data.message}`;
                        playlistId.value = '';
                    } catch (e) {
                        isError.value = true;
                        message.value = e.message;
                    } finally {
                        loading.value = false;
                    }
                };

                return { token, playlistId, loading, message, isError, runIngest };
            }
        }).mount('#app');
    </script>
</body>
</html>
