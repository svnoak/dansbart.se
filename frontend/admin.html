<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dansbart Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body class="bg-gray-900 text-white p-2 sm:p-4 md:p-8">
    <div id="app" class="max-w-6xl mx-auto">
        <h1 class="text-xl sm:text-2xl font-bold mb-4 sm:mb-6">🤖 Dansbart Admin Console</h1>

        <!-- Login Section (always visible until authenticated) -->
        <div v-if="!authenticated" class="max-w-md mx-auto">
            <div class="bg-gray-800 p-6 rounded-lg border border-gray-700">
                <h2 class="font-bold mb-4">🔐 Authentication</h2>
                <div class="mb-4">
                    <label class="block text-xs uppercase text-gray-500 mb-1">Admin Token</label>
                    <input v-model="token" type="password" @keyup.enter="authenticate"
                           class="w-full bg-gray-900 border border-gray-600 rounded p-2 text-white">
                </div>
                <button @click="authenticate" :disabled="loading"
                        class="w-full bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 py-2 rounded font-bold">
                    {{ loading ? 'Verifying...' : 'Login' }}
                </button>
                <p v-if="authError" class="mt-2 text-red-400 text-sm">{{ authError }}</p>
            </div>
        </div>

        <!-- Admin Panel Container (loaded dynamically) -->
        <div v-else>
            <div id="admin-panel-container" class="text-center text-gray-400">
                <div class="animate-spin inline-block w-8 h-8 border-4 border-indigo-600 border-t-transparent rounded-full"></div>
                <p class="mt-4">Loading admin panel...</p>
            </div>
        </div>
    </div>

    <!-- Separate container for admin panel Vue app (outside main app scope) -->
    <div id="admin-panel-mount-point"></div>

    <script>
        const { createApp, ref, onMounted } = Vue;

        createApp({
            setup() {
                const token = ref(localStorage.getItem('admin_token') || '');
                const authenticated = ref(false);
                const authError = ref('');
                const loading = ref(false);

                const authenticate = async () => {
                    loading.value = true;
                    authError.value = '';

                    try {
                        const res = await fetch('/api/admin/tracks?limit=1', {
                            headers: { 'x-admin-token': token.value }
                        });

                        if (!res.ok) throw new Error('Invalid token');

                        localStorage.setItem('admin_token', token.value);
                        authenticated.value = true;

                        // Load the admin panel dynamically
                        loadAdminPanel();
                    } catch (e) {
                        authError.value = 'Authentication failed. Check your token.';
                    } finally {
                        loading.value = false;
                    }
                };

                const loadAdminPanel = () => {
                    console.log('[Admin] Starting to load admin panel...');

                    // Dynamically load the admin panel HTML and script (with cache busting)
                    fetch('/admin-panel.html?v=' + Date.now())
                        .then(res => {
                            console.log('[Admin] Fetch response status:', res.status);
                            if (!res.ok) throw new Error(`HTTP ${res.status}`);
                            return res.text();
                        })
                        .then(html => {
                            console.log('[Admin] Received HTML, length:', html.length);

                            // Extract script content from HTML
                            const scriptMatch = html.match(/<script>([\s\S]*?)<\/script>/);
                            const scriptContent = scriptMatch ? scriptMatch[1] : '';
                            console.log('[Admin] Script extracted, length:', scriptContent.length);

                            // Remove script tag from HTML before inserting
                            const htmlWithoutScript = html.replace(/<script>[\s\S]*?<\/script>/, '');

                            // Hide loading message
                            document.getElementById('admin-panel-container').style.display = 'none';

                            // Insert HTML into separate mount point (outside main Vue app)
                            document.getElementById('admin-panel-mount-point').innerHTML = htmlWithoutScript;
                            console.log('[Admin] HTML inserted into DOM');

                            // Execute the script content
                            if (scriptContent) {
                                try {
                                    eval(scriptContent);
                                    console.log('[Admin] Script evaluated');
                                } catch (evalError) {
                                    console.error('[Admin] Script evaluation error:', evalError);
                                    throw evalError;
                                }
                            }

                            // Initialize the admin panel with the token
                            if (window.initAdminPanel) {
                                console.log('[Admin] Calling initAdminPanel...');
                                window.initAdminPanel(token.value);
                                console.log('[Admin] Admin panel initialized successfully');
                            } else {
                                console.error('[Admin] window.initAdminPanel not found!');
                                throw new Error('initAdminPanel function not found');
                            }
                        })
                        .catch(e => {
                            console.error('[Admin] Failed to load admin panel:', e);
                            document.getElementById('admin-panel-container').innerHTML =
                                `<div class="text-red-400">
                                    <p class="font-bold">Failed to load admin panel</p>
                                    <p class="text-sm mt-2">${e.message}</p>
                                    <p class="text-xs mt-2 text-gray-500">Check browser console for details</p>
                                </div>`;
                            document.getElementById('admin-panel-container').style.display = 'block';
                        });
                };

                const logout = () => {
                    authenticated.value = false;
                    token.value = '';
                    localStorage.removeItem('admin_token');
                    location.reload(); // Reload to clear the dynamically loaded content
                };

                // Auto-login if token exists
                onMounted(() => {
                    if (token.value) {
                        authenticate();
                    }
                });

                // Expose logout to window for admin panel
                window.adminLogout = logout;

                return {
                    token,
                    authenticated,
                    authError,
                    loading,
                    authenticate
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
