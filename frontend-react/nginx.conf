server {
    listen 80;
    server_name localhost;

    absolute_redirect off;

    # 1. Serve Static Files (Your HTML/JS)
    # Never cache the app shell so normal refresh always loads the current app (not cached Vue).
    location = /index.html {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        etag off;
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ =404;
    }

    error_page 404 /index.html;

    # 2. Reverse Proxy API calls to the Backend Container
    #
    # Use proxy_pass without an extra /api/ suffix so that a request like:
    #   /api/admin/auth/login
    # is forwarded to the backend as:
    #   http://api:8000/api/admin/auth/login
    location /api/ {
        # 'api' is the service name in docker-compose
        proxy_pass http://api:8000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
