services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.api
    platform: linux/amd64
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0

  db:
    image: pgvector/pgvector:pg15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=dansbart
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

  # Audio Worker (Heavy ML models)
  worker-audio:
    build:
      context: .
      dockerfile: backend/Dockerfile.audio
    platform: linux/amd64
    command: celery -A app.core.celery_app worker --loglevel=info --pool=solo -Q audio
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      - WORKER_TYPE=audio
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - CUDA_VISIBLE_DEVICES=-1
      - TF_CPP_MIN_LOG_LEVEL=3
    depends_on:
      - db
      - redis
    shm_size: '2gb'
    mem_limit: '4g'

  # Light Worker (Discovery, Ingestion, No ML)
  worker-light:
    build:
      context: .
      dockerfile: backend/Dockerfile.workers
    platform: linux/amd64
    command: celery -A app.core.celery_app worker --loglevel=info --pool=solo -Q light
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      - WORKER_TYPE=light
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - db
      - redis
    mem_limit: '1g'

  # Authentik - Authentication & Identity Provider
  authentik-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authentik"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - authentik_postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${AUTHENTIK_PG_PASSWORD:-authentik}
      POSTGRES_USER: authentik
      POSTGRES_DB: authentik

  authentik-redis:
    image: redis:alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 5

  authentik-server:
    image: ghcr.io/goauthentik/server:2024.8
    restart: unless-stopped
    command: server
    environment:
      AUTHENTIK_REDIS__HOST: authentik-redis
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgres
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_PG_PASSWORD:-authentik}
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
      AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
      # For local development without HTTPS
      AUTHENTIK_LISTEN__HTTP: 0.0.0.0:9000
    volumes:
      - authentik_media:/media
      - authentik_templates:/templates
    ports:
      - "9000:9000"  # Web UI & OIDC endpoints
    depends_on:
      - authentik-postgres
      - authentik-redis

  authentik-worker:
    image: ghcr.io/goauthentik/server:2024.8
    restart: unless-stopped
    command: worker
    environment:
      AUTHENTIK_REDIS__HOST: authentik-redis
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgres
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_PG_PASSWORD:-authentik}
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
    volumes:
      - authentik_media:/media
      - authentik_templates:/templates
    depends_on:
      - authentik-postgres
      - authentik-redis

volumes:
  postgres_data:
  authentik_postgres:
  authentik_media:
  authentik_templates: