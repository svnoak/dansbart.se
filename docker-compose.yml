services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.api
    platform: linux/amd64
    volumes:
      - ./backend:/app  # Syncs your local folder to Docker (Live Code Editing)
    env_file:
      - ./backend/.env
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"
    # This keeps the container running so we can exec commands into it
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0

  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=dansbart
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

  # Audio Worker (Heavy ML models)
  worker-audio:
    build:
      context: ./backend
      dockerfile: Dockerfile.audio
    platform: linux/amd64
    command: celery -A app.core.celery_app worker --loglevel=info --pool=solo -Q audio
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      - WORKER_TYPE=audio
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - CUDA_VISIBLE_DEVICES=-1
    depends_on:
      - db
      - redis
    shm_size: '2gb'
    mem_limit: '4g'

  # Light Worker (Discovery, Ingestion, No ML)
  worker-light:
    build:
      context: ./backend
      dockerfile: Dockerfile.workers
    platform: linux/amd64
    command: celery -A app.core.celery_app worker --loglevel=info --pool=solo -Q light
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      - WORKER_TYPE=light
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - db
      - redis
    mem_limit: '1g'

volumes:
  postgres_data: