# ====================================================
# DANSBART AUDIO WORKER - STANDALONE DOCKER COMPOSE
# AGPL-3.0 Licensed
#
# For development/testing. In production, this worker
# connects to the main dansbart.se PostgreSQL and Redis.
# ====================================================

services:
  # Audio Analysis Worker
  audio-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dansbart-audio-worker
    environment:
      # Database connection (use same DB as main app)
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - POSTGRES_SERVER=${POSTGRES_SERVER:-db}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB:-dansbart}
      # Celery
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      # neckenml models
      - NECKENML_MODEL_DIR=/app/models
    volumes:
      # Persistent volume for ML models (survives container updates)
      # First deploy: copy models into the volume manually or via init script
      - audio_models:/app/models
      # Temp audio files (cleaned after each analysis)
      - audio_temp:/app/temp_audio
    depends_on:
      - redis
      - db
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
    shm_size: '2gb'
    restart: unless-stopped

  # Redis for Celery (development only)
  redis:
    image: redis:7-alpine
    container_name: dansbart-audio-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  # PostgreSQL with pgvector (development only)
  db:
    image: pgvector/pgvector:pg15
    container_name: dansbart-audio-db
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - POSTGRES_DB=${POSTGRES_DB:-dansbart}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
  audio_temp:
  audio_models:  # Persistent storage for ML models
