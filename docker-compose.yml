services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.api
    platform: linux/amd64
    volumes:
      - ./backend:/app
      - ../neckenml-analyzer:/neckenml  # Mount neckenml for local development (rw for pip install -e)
    env_file:
      - ./backend/.env
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"
    command: >
      sh -c "pip install -e /neckenml/packages/neckenml-core --quiet &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0

  db:
    image: pgvector/pgvector:pg15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=dansbart
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # React (Vite) app – use frontend-react. (Legacy Vue app is in ./frontend.)
  frontend:
    build:
      context: ./frontend-react
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - backend

  # Audio Worker (AGPL-3.0) - From git submodule: ./audio-worker
  # To add submodule: git submodule add https://github.com/svnoak/dansbart-audio-worker.git audio-worker
  worker-audio:
    build:
      context: ./audio-worker
      dockerfile: Dockerfile
    platform: linux/amd64
    command: >
      sh -c "pip install -e /neckenml/packages/neckenml-core -e /neckenml/packages/neckenml-analyzer --quiet &&
             celery -A app.core.celery_app worker --loglevel=info --pool=solo -Q audio"
    volumes:
      - ./audio-worker/app:/app/app:ro  # Mount for development hot-reload
      - audio_models:/app/models  # Persistent volume for ML models
      - style_head_data:/app/neckenml_style_head  # Production-trained custom_style_head.pkl
      - ../neckenml-analyzer:/neckenml  # Mount neckenml for local development (rw for pip install -e)
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_SERVER=db
      - POSTGRES_DB=dansbart
      - CELERY_BROKER_URL=redis://redis:6379/0
      - NECKENML_MODEL_DIR=/app/models
    depends_on:
      - db
      - redis
    shm_size: '2gb'
    mem_limit: '4g'

  # Light Worker (Discovery, Ingestion, No ML)
  worker-light:
    build:
      context: .
      dockerfile: backend/Dockerfile.workers
    platform: linux/amd64
    command: >
      sh -c "pip install -e /neckenml/packages/neckenml-core --quiet &&
             celery -A app.core.celery_app worker --loglevel=info --pool=solo -Q light"
    volumes:
      - ./backend:/app
      - ../neckenml-analyzer:/neckenml  # Mount neckenml for local development (rw for pip install -e)
    env_file:
      - ./backend/.env
    environment:
      - WORKER_TYPE=light
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - db
      - redis
    mem_limit: '1g'

volumes:
  postgres_data:
  audio_models:  # Persistent storage for ML models (survives container updates)
  style_head_data:  # Production-trained custom_style_head.pkl; persists across worker upgrades