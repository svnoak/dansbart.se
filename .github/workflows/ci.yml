name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend/workers/feature
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio

      - name: Run unit tests
        working-directory: backend/workers/feature
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_SERVER: localhost
          POSTGRES_DB: test_db
          REDIS_URL: redis://localhost:6379/0
          TESTING: "true"
        run: |
          pytest tests/ -v --tb=short -m "not integration" \
            --ignore=tests/e2e/test_youtube_fetch.py \
            --cov=app --cov-report=xml

      - name: Run integration tests
        working-directory: backend/workers/feature
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379/0
          TESTING: "true"
        run: |
          pytest tests/ -v --tb=short -m "integration" || echo "Integration tests may need database setup"

      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          file: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run linting
        working-directory: frontend
        run: npm run lint || echo "Linting issues found"

      - name: Run type check
        working-directory: frontend
        run: npm run type-check || echo "Type check not configured"

      - name: Run frontend tests
        working-directory: frontend
        run: npm run test:run

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install linters
        run: pip install black flake8 isort

      - name: Run black
        working-directory: backend/workers/feature
        run: black --check app/ tests/ || echo "Code formatting issues found"

      - name: Run flake8
        working-directory: backend/workers/feature
        run: flake8 app/ tests/ --max-line-length=100 --ignore=E501,W503 || echo "Linting issues found"

      - name: Run isort
        working-directory: backend/workers/feature
        run: isort --check-only app/ tests/ || echo "Import sorting issues found"

  test-java-api:
    name: Java API Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run Java tests
        working-directory: backend/api
        run: mvn test -B -q -DskipDbBuild=true

  test-audio-worker:
    name: Audio Worker Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsndfile1 ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install sqlalchemy psycopg2-binary pydantic-settings python-dotenv
          pip install celery redis
          pip install pytest pytest-cov

      - name: Install neckenml-core for unit tests
        run: |
          pip install neckenml-core || echo "neckenml-core not yet published, tests may skip"

      - name: Run unit tests
        working-directory: backend/workers/audio
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379/0
          TESTING: "true"
        run: |
          pytest tests/ -v --tb=short -m "not integration and not requires_audio" --cov=app --cov-report=xml || echo "Some tests may fail without full deps"

      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          file: backend/workers/audio/coverage.xml
          flags: audio-worker
          fail_ci_if_error: false

  lint-audio-worker:
    name: Lint Audio Worker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install linters
        run: pip install black flake8 isort

      - name: Run black
        working-directory: backend/workers/audio
        run: black --check app/ tests/ || echo "Code formatting issues found"

      - name: Run flake8
        working-directory: backend/workers/audio
        run: flake8 app/ tests/ --max-line-length=100 --ignore=E501,W503 || echo "Linting issues found"

      - name: Run isort
        working-directory: backend/workers/audio
        run: isort --check-only app/ tests/ || echo "Import sorting issues found"

  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      feature-worker: ${{ steps.filter.outputs.feature-worker }}
      audio-worker: ${{ steps.filter.outputs.audio-worker }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Filter changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'backend/api/**'
            feature-worker:
              - 'backend/workers/feature/**'
            audio-worker:
              - 'backend/workers/audio/**'
            frontend:
              - 'frontend/**'

  docker-build-api:
    name: Docker Build (API)
    runs-on: ubuntu-latest
    needs: [test-java-api, detect-changes]
    if: needs.detect-changes.outputs.api == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/api
          file: ./backend/api/Dockerfile
          push: false
          tags: dansbart-api:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-build-feature-worker:
    name: Docker Build (Feature Worker)
    runs-on: ubuntu-latest
    needs: [test-backend, detect-changes]
    if: needs.detect-changes.outputs.feature-worker == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Feature Worker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/workers/feature
          file: ./backend/workers/feature/Dockerfile
          push: false
          tags: dansbart-feature-worker:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-build-audio-worker:
    name: Docker Build (Audio Worker)
    runs-on: ubuntu-latest
    needs: [test-audio-worker, detect-changes]
    if: needs.detect-changes.outputs.audio-worker == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Audio Worker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/workers/audio
          file: ./backend/workers/audio/Dockerfile
          push: false
          tags: dansbart-audio-worker:test
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-build-frontend:
    name: Docker Build (Frontend)
    runs-on: ubuntu-latest
    needs: [test-frontend, detect-changes]
    if: needs.detect-changes.outputs.frontend == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: dansbart-frontend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  summary:
    name: CI Summary
    needs: [test-backend, test-frontend, test-java-api, test-audio-worker, lint-backend, lint-audio-worker, docker-build-api, docker-build-feature-worker, docker-build-audio-worker, docker-build-frontend]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Create Summary
        run: |
          echo "## Dansbart.se CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Tests (Python) | ${{ needs.test-backend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Audio Worker Tests | ${{ needs.test-audio-worker.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Tests | ${{ needs.test-frontend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Java API Tests | ${{ needs.test-java-api.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Lint | ${{ needs.lint-backend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Audio Worker Lint | ${{ needs.lint-audio-worker.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Build (API) | ${{ needs.docker-build-api.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Build (Feature Worker) | ${{ needs.docker-build-feature-worker.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Build (Audio Worker) | ${{ needs.docker-build-audio-worker.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Build (Frontend) | ${{ needs.docker-build-frontend.result }} |" >> $GITHUB_STEP_SUMMARY
