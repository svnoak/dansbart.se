name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend/workers/feature
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio

      - name: Run unit tests
        working-directory: backend/workers/feature
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_SERVER: localhost
          POSTGRES_DB: test_db
          REDIS_URL: redis://localhost:6379/0
          TESTING: "true"
        run: |
          pytest tests/ -v --tb=short -m "not integration" \
            --ignore=tests/e2e/test_youtube_fetch.py \
            --cov=app --cov-report=xml

      - name: Run integration tests
        working-directory: backend/workers/feature
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379/0
          TESTING: "true"
        run: |
          pytest tests/ -v --tb=short -m "integration" || echo "Integration tests may need database setup"

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run linting
        working-directory: frontend
        run: npm run lint || echo "Linting issues found"

      - name: Run type check
        working-directory: frontend
        run: npm run type-check || echo "Type check not configured"

      - name: Run frontend tests
        working-directory: frontend
        run: npm run test:run

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linters
        run: pip install black flake8 isort

      - name: Run black
        working-directory: backend/workers/feature
        run: black --check app/ tests/ || echo "Code formatting issues found"

      - name: Run flake8
        working-directory: backend/workers/feature
        run: flake8 app/ tests/ --max-line-length=100 --ignore=E501,W503 || echo "Linting issues found"

      - name: Run isort
        working-directory: backend/workers/feature
        run: isort --check-only app/ tests/ || echo "Import sorting issues found"

  test-java-api:
    name: Java API Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run Java tests
        working-directory: backend/api
        run: mvn test -B -q -DskipDbBuild=true

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, test-java-api]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/api
          file: ./backend/api/Dockerfile
          push: false
          tags: dansbart-api:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Workers image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/workers/feature
          file: ./backend/workers/feature/Dockerfile
          push: false
          tags: dansbart-workers:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: dansbart-frontend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  summary:
    name: CI Summary
    needs: [test-backend, test-frontend, test-java-api, lint-backend, docker-build]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Create Summary
        run: |
          echo "## Dansbart.se CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Tests (Python) | ${{ needs.test-backend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Tests | ${{ needs.test-frontend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Java API Tests | ${{ needs.test-java-api.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Lint | ${{ needs.lint-backend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Build | ${{ needs.docker-build.result }} |" >> $GITHUB_STEP_SUMMARY
