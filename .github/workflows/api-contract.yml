name: API Contract

on:
  pull_request:
    branches:
      - '**'
    paths:
      - 'backend/api/**'
      - 'api-spec/**'
  push:
    branches:
      - '**'
    paths:
      - 'backend/api/**'

jobs:
  generate-openapi:
    name: Generate OpenAPI Spec
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Generate OpenAPI spec
        working-directory: backend/api
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/test_db
          SPRING_DATASOURCE_USERNAME: test
          SPRING_DATASOURCE_PASSWORD: test
        run: |
          mvn clean verify -DskipTests=true \
            -Djooq.codegen.jdbc.url=jdbc:postgresql://localhost:5432/test_db \
            -Djooq.codegen.jdbc.user=test \
            -Djooq.codegen.jdbc.password=test

      - name: Upload OpenAPI spec
        uses: actions/upload-artifact@v4
        with:
          name: openapi-spec
          path: api-spec/openapi.yaml

  detect-breaking-changes:
    name: Detect Breaking Changes
    runs-on: ubuntu-latest
    needs: generate-openapi
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}
          path: base

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          path: head

      - name: Download generated spec
        uses: actions/download-artifact@v4
        with:
          name: openapi-spec
          path: head/api-spec

      - name: Check for OpenAPI spec in base
        id: check-base-spec
        run: |
          if [ -f "base/api-spec/openapi.yaml" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Run oasdiff breaking changes check
        if: steps.check-base-spec.outputs.exists == 'true'
        uses: oasdiff/oasdiff-action/breaking@main
        with:
          base: base/api-spec/openapi.yaml
          revision: head/api-spec/openapi.yaml
          fail-on-diff: true

      - name: Run oasdiff changelog
        if: steps.check-base-spec.outputs.exists == 'true'
        uses: oasdiff/oasdiff-action/changelog@main
        with:
          base: base/api-spec/openapi.yaml
          revision: head/api-spec/openapi.yaml
          format: markdown

  update-spec:
    name: Update OpenAPI Spec
    runs-on: ubuntu-latest
    needs: generate-openapi
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download generated spec
        uses: actions/download-artifact@v4
        with:
          name: openapi-spec
          path: api-spec

      - name: Check for changes
        id: diff
        run: |
          git add api-spec/openapi.yaml
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit updated spec
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git commit -m "chore: update OpenAPI spec [skip ci]"
          git push

  generate-client:
    name: Generate API Client
    runs-on: ubuntu-latest
    needs: generate-openapi
    if: github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Download OpenAPI spec
        uses: actions/download-artifact@v4
        with:
          name: openapi-spec
          path: api-spec

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Generate API client
        working-directory: frontend
        run: npm run api:generate

      - name: Check for client changes
        id: client-diff
        run: |
          git add frontend/src/api/generated frontend/src/api/models
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit generated client
        if: steps.client-diff.outputs.changed == 'true' && github.ref == 'refs/heads/main'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git commit -m "chore: regenerate API client [skip ci]"
          git push
