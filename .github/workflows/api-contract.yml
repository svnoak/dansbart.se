name: API Contract

on:
  pull_request:
    branches:
      - '**'
    paths:
      - 'backend/api/**'
      - 'api-spec/**'

jobs:
  generate-openapi:
    name: Generate OpenAPI Spec
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Generate OpenAPI spec
        working-directory: backend/api
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/test_db
          SPRING_DATASOURCE_USERNAME: test
          SPRING_DATASOURCE_PASSWORD: test
          DISCOURSE_SSO_URL: http://localhost:9999/discourse/sso
          DISCOURSE_SSO_SECRET: ci-placeholder-secret
          DISCOURSE_SSO_RETURN_URL: http://localhost:8080/sso/callback
          DISCOURSE_SSO_SUCCESS_URL: http://localhost:8080/
        run: |
          mvn clean verify -DskipTests=true \
            -Djooq.codegen.jdbc.url=jdbc:postgresql://localhost:5432/test_db \
            -Djooq.codegen.jdbc.user=test \
            -Djooq.codegen.jdbc.password=test

      - name: Upload OpenAPI spec
        uses: actions/upload-artifact@v4
        with:
          name: openapi-spec
          path: api-spec/openapi.yaml

  detect-breaking-changes:
    name: Detect Breaking Changes
    runs-on: ubuntu-latest
    needs: generate-openapi

    steps:
      - name: Checkout base branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.base_ref }}
          path: base

      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          path: head

      - name: Download generated spec
        uses: actions/download-artifact@v4
        with:
          name: openapi-spec
          path: head/api-spec

      - name: Check for OpenAPI spec in base
        id: check-base-spec
        run: |
          if [ -f "base/api-spec/openapi.yaml" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Run oasdiff breaking changes check
        if: steps.check-base-spec.outputs.exists == 'true'
        uses: oasdiff/oasdiff-action/breaking@main
        with:
          base: base/api-spec/openapi.yaml
          revision: head/api-spec/openapi.yaml
          fail-on-diff: true

      - name: Run oasdiff changelog
        if: steps.check-base-spec.outputs.exists == 'true'
        uses: oasdiff/oasdiff-action/changelog@main
        with:
          base: base/api-spec/openapi.yaml
          revision: head/api-spec/openapi.yaml
          format: markdown

