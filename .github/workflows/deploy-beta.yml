name: Deploy to Beta

on:
  push:
    branches:
      - develop
  workflow_dispatch:  # Allow manual triggers

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/dansbart

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service: [frontend, backend]

    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive  # Include neckenml-analyzer submodule

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=raw,value=beta
            type=sha,prefix=beta-
            type=ref,event=branch

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service == 'backend' && '.' || './frontend' }}
          file: ./${{ matrix.service }}/${{ matrix.service == 'backend' && 'Dockerfile.api' || 'Dockerfile' }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:buildcache,mode=max
          platforms: linux/amd64

  build-and-push-workers:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        worker:
          - name: audio-worker
            dockerfile: Dockerfile.audio
          - name: light-worker
            dockerfile: Dockerfile.workers

    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive  # Include neckenml-analyzer submodule

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.worker.name }}
          tags: |
            type=raw,value=beta
            type=sha,prefix=beta-
            type=ref,event=branch

      - name: Build and push ${{ matrix.worker.name }} image
        uses: docker/build-push-action@v5
        with:
          context: .  # Root context to include neckenml-analyzer submodule
          file: ./backend/${{ matrix.worker.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.worker.name }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.worker.name }}:buildcache,mode=max
          platforms: linux/amd64

  deploy:
    needs: [build-and-push, build-and-push-workers]
    runs-on: ubuntu-latest

    steps:
      - name: Deploy notification
        run: |
          echo "🧪 Beta images built and pushed successfully!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Images:**" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend: \`${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:beta\`" >> $GITHUB_STEP_SUMMARY
          echo "- Backend: \`${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:beta\`" >> $GITHUB_STEP_SUMMARY
          echo "- Audio Worker: \`${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-audio-worker:beta\`" >> $GITHUB_STEP_SUMMARY
          echo "- Light Worker: \`${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-light-worker:beta\`" >> $GITHUB_STEP_SUMMARY

      # Add your beta deployment steps here
      # Example: SSH into beta server and pull new images
      # - name: Deploy to beta server
      #   uses: appleboy/ssh-action@master
      #   with:
      #     host: ${{ secrets.BETA_HOST }}
      #     username: ${{ secrets.BETA_USER }}
      #     key: ${{ secrets.BETA_SSH_KEY }}
      #     script: |
      #       cd /path/to/beta-app
      #       docker compose pull
      #       docker compose up -d
