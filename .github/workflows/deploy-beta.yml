      #   uses: appleboy/ssh-action@master
      #   with:
      #     host: ${{ secrets.BETA_HOST }}
      #     username: ${{ secrets.BETA_USER }}
      #     key: ${{ secrets.BETA_SSH_KEY }}
      #     script: |
      #       cd /path/to/beta-app
      #       docker compose pull
      #       docker compose up -d
