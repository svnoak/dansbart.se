spring:
  application:
    name: dansbart-api-test

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    baseline-description: "Existing schema from Alembic migrations"
    locations: classpath:db/migration
    validate-on-migrate: false

  # OAuth2 disabled for tests - using mock JWT decoder
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9999/test-issuer

server:
  port: 0  # Random port for tests

logging:
  level:
    se.dansbart: INFO
    org.springframework.security: WARN
    org.testcontainers: WARN
    org.hibernate.SQL: WARN

# Custom application properties for tests
dansbart:
  celery:
    broker-url: redis://localhost:6379/0
    queues:
      audio: audio
      feature: feature
      light: light
  auth:
    enabled: true
