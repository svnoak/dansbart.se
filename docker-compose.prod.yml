# Production deployment using GitHub Container Registry images
services:
  backend:
    image: ghcr.io/svnoak/dansbart-backend:production
    platform: linux/amd64
    env_file:
      - .env
    depends_on:
      - db
      - redis
    expose:
      - "8000"
    networks:
      - default
    restart: unless-stopped

  db:
    image: postgres:15
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-dansbart}
    networks:
      - default
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    networks:
      - default
    restart: unless-stopped

  frontend:
    image: ghcr.io/svnoak/dansbart-frontend:production
    depends_on:
      - backend
    networks:
      - default
      - caddy_net
    labels:
      caddy: beta.dansbart.se
      caddy.reverse_proxy: "{{upstreams 80}}"
    restart: unless-stopped

  worker:
    image: ghcr.io/svnoak/dansbart-worker:production
    platform: linux/amd64
    env_file:
      - .env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - CUDA_VISIBLE_DEVICES=-1
    depends_on:
      - db
      - redis
    networks:
      - default
    shm_size: '2gb'
    mem_limit: '4g'
    restart: unless-stopped

networks:
  caddy_net:
    external: true
  default:
    driver: bridge

volumes:
  postgres_data_prod: