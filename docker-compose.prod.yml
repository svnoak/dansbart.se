# Production deployment using GitHub Container Registry images
services:
  backend:
    image: ghcr.io/svnoak/dansbart-backend:production
    platform: linux/amd64
    env_file:
      - .env.production
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"
    restart: unless-stopped

  db:
    image: postgres:15
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-dansbart}
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  frontend:
    image: ghcr.io/svnoak/dansbart-frontend:production
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    restart: unless-stopped
    # If using SSL/TLS, mount certificates:
    # volumes:
    #   - /etc/letsencrypt:/etc/letsencrypt:ro

  worker:
    image: ghcr.io/svnoak/dansbart-worker:production
    platform: linux/amd64
    env_file:
      - .env.production
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - CUDA_VISIBLE_DEVICES=-1
    depends_on:
      - db
      - redis
    shm_size: '2gb'
    mem_limit: '4g'
    restart: unless-stopped

volumes:
  postgres_data_prod:
